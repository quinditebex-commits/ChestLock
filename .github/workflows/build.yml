name: Build ChestLock JAR
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn clean package -B
      - uses: actions/upload-artifact@v4
        with:
          name: ChestLock-1.0
          path: target/ChestLock-1.0.jar
